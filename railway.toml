[build]
builder = "NIXPACKS"
buildCommand = "cd frontend && npm install && npm run build && cp -r dist/. ../backend/src/main/resources/static/ && cd ../backend && mvn clean package -DskipTests"

[deploy]
startCommand = "java $JAVA_OPTS -jar backend/target/*.jar"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3